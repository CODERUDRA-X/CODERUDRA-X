# [!] CODERUDRA-X STAR WARS
#  Space Defense Interceptor (Auto-Generator)
name: Space Defense Contribution Shooter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Shooter SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force Node 24 to kill the warning(imp.)
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' 
        run: python shooter.py

      - name: Commit and Push
        run: |
          git config --global user.name "CODERUDRA-X"
          git config --global user.email "harshgroups247@gmail.com"
          git add contribution_shooter.svg
          git commit -m "Space Defense: Precision Strike SVG Updated" || exit 0
          git push
