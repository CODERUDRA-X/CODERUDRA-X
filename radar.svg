<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <circle cx="50" cy="50" r="48" fill="#050505" stroke="#00ff00" stroke-width="1"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00aa00" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#005500" stroke-width="0.5"/>
  <line x1="50" y1="2" x2="50" y2="98" stroke="#005500" stroke-width="0.5"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#005500" stroke-width="0.5"/>
  
  <path d="M50,50 L50,2 A48,48 0 0,1 98,50 Z" fill="rgba(0, 255, 0, 0.4)">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <circle cx="70" cy="30" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="1;0;0;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="65" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0;0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
